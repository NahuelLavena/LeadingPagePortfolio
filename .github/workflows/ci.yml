name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mi-portfolio/package-lock.json

      - name: Install dependencies
        working-directory: ./mi-portfolio
        run: npm ci

      - name: Run ESLint
        working-directory: ./mi-portfolio
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mi-portfolio/package-lock.json

      - name: Install dependencies
        working-directory: ./mi-portfolio
        run: npm ci

      - name: Run tests
        working-directory: ./mi-portfolio
        run: npm run test:run

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mi-portfolio/package-lock.json

      - name: Install dependencies
        working-directory: ./mi-portfolio
        run: npm ci

      - name: Build project
        working-directory: ./mi-portfolio
        run: npm run build
